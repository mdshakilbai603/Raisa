<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABSTRACT | GLOBAL ENCRYPTED NETWORK</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400;700;900&family=Playfair+Display:ital,wght@0,400;1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg: #030303;
            --accent: #e0c097; /* Rose Gold */
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(224, 192, 151, 0.15);
            --silver: #888;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; }

        /* --- ৩ সেকেন্ডের গ্লোবাল ইন্ট্রো এনিমেশন --- */
        #intro-shutter {
            position: fixed; inset: 0; background: #000; z-index: 10000;
            display: flex; justify-content: center; align-items: center;
            transition: 1.5s cubic-bezier(1, 0, 0, 1);
        }
        .intro-content { text-align: center; }
        .intro-logo { font-family: 'Playfair Display'; font-size: 3rem; letter-spacing: 25px; color: var(--accent); opacity: 0; animation: reveal 2.5s forwards; }
        @keyframes reveal { 0% { opacity: 0; letter-spacing: 5px; filter: blur(10px); } 100% { opacity: 1; letter-spacing: 25px; filter: blur(0px); } }

        /* --- মেইন অ্যাপ লেআউট --- */
        .abstract-wrapper { display: grid; grid-template-columns: 80px 350px 1fr; height: 100vh; width: 100vw; opacity: 0; transition: 2s; }
        .loaded .abstract-wrapper { opacity: 1; }

        /* ১. গ্লোবাল নেভিগেশন বার (সবার বামে) */
        nav { background: #000; border-right: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; padding: 30px 0; }
        nav .nav-icon { font-size: 1.4rem; color: var(--silver); margin-bottom: 45px; cursor: pointer; transition: 0.4s; position: relative; }
        nav .nav-icon:hover, nav .nav-icon.active { color: var(--accent); transform: scale(1.1); }
        nav .nav-icon.active::after { content: ''; position: absolute; left: -25px; top: 5px; width: 3px; height: 20px; background: var(--accent); }

        /* ২. ইউজার লিস্ট ও সার্চ (মাঝে) */
        .sidebar { background: #050505; border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .sidebar-header { padding: 30px; border-bottom: 1px solid var(--border); }
        .sidebar-header h2 { font-family: 'Playfair Display'; font-style: italic; font-size: 1.5rem; letter-spacing: 2px; }
        .search-container { padding: 15px 30px; }
        .search-container input { width: 100%; background: var(--glass); border: 1px solid var(--border); padding: 12px 15px; color: #fff; font-size: 0.8rem; letter-spacing: 1px; }
        
        .user-list { flex: 1; overflow-y: auto; padding: 10px 20px; }
        .user-item { display: flex; align-items: center; padding: 15px; border-radius: 2px; cursor: pointer; transition: 0.3s; margin-bottom: 10px; border: 1px solid transparent; }
        .user-item:hover { background: var(--glass); border-color: var(--border); }
        .user-avatar { width: 50px; height: 50px; border-radius: 50%; border: 1px solid var(--accent); margin-right: 15px; object-fit: cover; }
        .user-info h4 { font-size: 0.9rem; letter-spacing: 1px; }
        .user-info p { font-size: 0.7rem; color: var(--silver); margin-top: 4px; }

        /* ৩. চ্যাট ও ইন্টারফেস এরিয়া (ডানে) */
        main { display: flex; flex-direction: column; position: relative; background: radial-gradient(circle at 50% 50%, #0a0a0a 0%, #030303 100%); }
        .top-bar { padding: 20px 50px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .status-pill { padding: 5px 15px; background: rgba(0, 255, 0, 0.05); color: #00ff00; font-size: 0.6rem; border-radius: 20px; letter-spacing: 2px; border: 1px solid rgba(0, 255, 0, 0.2); }
        
        .chat-canvas { flex: 1; padding: 50px; overflow-y: auto; display: flex; flex-direction: column; gap: 30px; }
        .bubble { max-width: 500px; padding: 20px 25px; line-height: 1.6; font-size: 0.95rem; position: relative; }
        .bubble.sent { align-self: flex-end; background: var(--accent); color: #000; border-radius: 30px 30px 0 30px; font-weight: 500; }
        .bubble.received { align-self: flex-start; background: var(--glass); border: 1px solid var(--border); border-radius: 30px 30px 30px 0; color: #eee; }

        /* ইনপুট টুলবার */
        .action-bar { padding: 35px 50px; display: flex; align-items: center; gap: 25px; border-top: 1px solid var(--border); }
        .action-bar input { flex: 1; background: transparent; border: none; font-size: 1rem; color: #fff; letter-spacing: 1px; }
        .action-btn { color: var(--silver); font-size: 1.2rem; cursor: pointer; transition: 0.3s; }
        .action-btn:hover { color: var(--accent); transform: translateY(-2px); }

        /* --- প্রোফাইল সেটআপ (গ্লোবাল ইউজার ইনপুট) --- */
        #registration-screen {
            position: fixed; inset: 0; background: #000; z-index: 10001;
            display: none; justify-content: center; align-items: center; padding: 20px;
        }
        .reg-card { width: 100%; max-width: 600px; padding: 60px; background: #050505; border: 1px solid var(--accent); }
        .reg-card h1 { font-family: 'Playfair Display'; font-size: 2.5rem; margin-bottom: 40px; color: var(--accent); }
        .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 25px; }
        .field { margin-bottom: 25px; }
        .field label { display: block; font-size: 0.65rem; color: var(--accent); letter-spacing: 3px; margin-bottom: 10px; text-transform: uppercase; }
        .field input, .field textarea, .field select { width: 100%; background: var(--glass); border: 1px solid var(--border); padding: 15px; color: #fff; }

        /* ভেরিফিকেশন ব্যাজ */
        .verified-mark { color: #3498db; margin-left: 5px; font-size: 0.8rem; }
    </style>
</head>
<body>

    <div id="intro-shutter"><div class="intro-content"><div class="intro-logo">ABSTRACT</div></div></div>

    <div id="registration-screen">
        <div class="reg-card">
            <h1>PROTOCOL_INIT</h1>
            <div class="input-row">
                <div class="field"><label>FIRST NAME</label><input type="text" id="fname" placeholder="John"></div>
                <div class="field"><label>LAST NAME</label><input type="text" id="lname" placeholder="Doe"></div>
            </div>
            <div class="field"><label>GLOBAL IDENTITY (EMAIL)</label><input type="email" id="email" placeholder="identity@global.com"></div>
            <div class="field"><label>LOCATION (CITY, COUNTRY)</label><input type="text" id="loc" placeholder="Mymensingh, Bangladesh"></div>
            <div class="field">
                <label>RELATIONSHIP STATUS</label>
                <select id="status">
                    <option value="Single">Single</option>
                    <option value="Complicated">Complicated</option>
                    <option value="Encrypted">Encrypted</option>
                </select>
            </div>
            <button onclick="activateSystem()" style="width: 100%; background: var(--accent); padding: 20px; border: none; font-weight: 900; letter-spacing: 5px; cursor: pointer;">ACTIVATE GLOBAL NODE</button>
        </div>
    </div>

    <div class="abstract-wrapper">
        <nav>
            <div class="nav-icon active"><i class="fas fa-layer-group"></i></div>
            <div class="nav-icon"><i class="fas fa-globe-americas"></i></div>
            <div class="nav-icon"><i class="fas fa-comment-dots"></i></div>
            <div class="nav-icon"><i class="fas fa-shield-alt"></i></div>
            <div class="nav-icon" style="margin-top: auto;" onclick="terminateSession()"><i class="fas fa-power-off"></i></div>
        </nav>

        <aside class="sidebar">
            <div class="sidebar-header"><h2>NET_CORE</h2></div>
            <div class="search-container"><input type="text" placeholder="SEARCH GLOBAL IDENTITY..."></div>
            <div class="user-list" id="global-users">
                <div class="user-item">
                    <img src="https://via.placeholder.com/50" class="user-avatar">
                    <div class="user-info"><h4>Anonymous_Node <i class="fas fa-check-circle verified-mark"></i></h4><p>Location: London, UK</p></div>
                </div>
            </div>
        </aside>

        <main>
            <div class="top-bar">
                <div><h3 id="current-chat">GLOBAL_ENCRYPTED_CHANNEL</h3><p style="font-size: 0.6rem; color: var(--silver); letter-spacing: 2px;">ENCRYPTION: AES-256 ACTIVE</p></div>
                <div class="status-pill">NODE_ONLINE</div>
                <div style="display: flex; gap: 25px; color: var(--accent);">
                    <i class="fas fa-phone-alt cursor-pointer"></i>
                    <i class="fas fa-video cursor-pointer"></i>
                    <i class="fas fa-map-marked-alt" onclick="revealLocation()"></i>
                </div>
            </div>

            <div class="chat-canvas" id="msg-flow">
                <div class="bubble received">Welcome to Abstract Global. Your identity is now hidden behind 7 layers of encryption.</div>
                <div class="bubble sent">System ready. Location tracking and security protocols are operational.</div>
            </div>

            <div class="action-bar">
                <i class="far fa-grin-alt action-btn"></i>
                <input type="text" id="chat-input" placeholder="Type your encrypted message...">
                <div style="display: flex; gap: 20px;">
                    <i class="fas fa-paperclip action-btn"></i>
                    <i class="fas fa-microphone action-btn"></i>
                    <i class="fas fa-paper-plane action-btn" style="color: var(--accent);" onclick="broadcast()"></i>
                </div>
            </div>
        </main>
    </div>

    <script>
        // ৩ সেকেন্ডের গ্লোবাল লোডার লজিক
        window.onload = () => {
            setTimeout(() => {
                document.getElementById('intro-shutter').style.transform = 'scale(1.2)';
                document.getElementById('intro-shutter').style.opacity = '0';
                setTimeout(() => { 
                    document.getElementById('intro-shutter').style.display = 'none';
                    document.body.classList.add('loaded');
                    if(!localStorage.getItem('global_node')) {
                        document.getElementById('registration-screen').style.display = 'flex';
                    }
                }, 1000);
            }, 3000);
        };

        function activateSystem() {
            const user = {
                firstName: document.getElementById('fname').value,
                lastName: document.getElementById('lname').value,
                location: document.getElementById('loc').value,
                status: document.getElementById('status').value
            };
            if(!user.firstName) { alert("Identity Required."); return; }
            localStorage.setItem('global_node', JSON.stringify(user));
            document.getElementById('registration-screen').style.fadeOut;
            location.reload();
        }

        function broadcast() {
            const input = document.getElementById('chat-input');
            if(!input.value) return;
            const bubble = document.createElement('div');
            bubble.className = 'bubble sent';
            bubble.innerText = input.value;
            document.getElementById('msg-flow').appendChild(bubble);
            input.value = '';
            document.getElementById('msg-flow').scrollTop = document.getElementById('msg-flow').scrollHeight;
        }

        function revealLocation() {
            navigator.geolocation.getCurrentPosition(p => {
                alert(`Real-time Node Location: ${p.coords.latitude}, ${p.coords.longitude}\nTracking Protection: ACTIVE`);
            });
        }

        function terminateSession() {
            if(confirm("Terminate this Global Node? All data will be wiped.")) {
                localStorage.clear();
                location.reload();
            }
        }
    </script>
</body>
</html>
