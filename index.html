<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ব্যারিস্টার রাইসা | অফিশিয়াল পোর্টাল</title>
    
    <style>
        /* ফন্ট: Hind Siliguri (বেস৬৪ ফন্ট ব্যবহার করে কোনো থার্ড-পার্টি লিঙ্ক বাদ দেওয়া হয়েছে) */
        @font-face {
            font-family: 'Hind Siliguri';
            src: url('data:font/woff2;base64,...(Base64_Encoded_Font_Data)...') format('woff2'); /* ডেভেলপার নোট: এখানে ডেভেলপারকে রিয়েল বেস৬৪ কোড বসাতে হবে */
            font-weight: 400; font-style: normal;
        }
        @font-face {
            font-family: 'Hind Siliguri';
            src: url('data:font/woff2;base64,...(Base64_Encoded_Font_Data_Bold)...') format('woff2'); /* ডেভেলপার নোট: এখানে বোল্ড ভার্সনের বেস৬৪ কোড বসাতে হবে */
            font-weight: 600; font-style: normal;
        }

        :root {
            --midnight: #0b1120;
            --rose-gold: #e2b49a;
            --soft-teal: #a8dadc;
            --text-main: #f0f0f0;
            --glass: rgba(255, 255, 255, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Hind Siliguri', sans-serif; }

        body { 
            background-color: var(--midnight); 
            color: var(--text-main); 
            overflow: hidden; /* লোডিং এর সময় স্ক্রল বন্ধ রাখা */
            display: flex; justify-content: center; align-items: center;
            height: 100vh;
        }

        /* --- 1. SUPER FAST INTRO ANIMATION (1 SEC) --- */
        #intro-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 10000; display: flex;
            justify-content: center; align-items: center; transition: 1s cubic-bezier(0.8, 0, 0.2, 1);
        }

        .loader-ring {
            width: 80px; height: 80px; border-radius: 50%;
            border: 4px solid var(--glass);
            border-top: 4px solid var(--rose-gold);
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* --- 2. MAIN LAYOUT --- */
        #main-ui { 
            display: none; opacity: 0; transition: 1s ease; 
            width: 100%; max-width: 480px; height: 100vh;
            background: radial-gradient(circle at center, #1a2530 0%, #0b1120 100%);
            display: flex; flex-direction: column;
        }

        header { padding: 40px 20px 20px; text-align: center; position: relative; }

        .profile-container {
            width: 120px; height: 120px; border-radius: 50%;
            padding: 5px; background: linear-gradient(45deg, var(--rose-gold), var(--soft-teal));
            margin: 0 auto 15px; cursor: pointer; position: relative;
        }
        .profile-container img { width: 100%; height: 100%; border-radius: 50%; border: 4px solid var(--midnight); }

        /* Save Icon overlay */
        .save-overlay {
            position: absolute; bottom: 5px; right: 5px;
            background: var(--midnight); border-radius: 50%;
            padding: 5px; color: var(--soft-teal); font-size: 0.8rem;
            display: flex; align-items: center; justify-content: center;
            border: 1px solid var(--soft-teal);
        }

        h1.title { font-size: 2.2rem; color: var(--rose-gold); margin-bottom: 5px; }

        /* Details List (New Design) */
        .details-grid { display: grid; grid-template-columns: 1fr; gap: 15px; padding: 30px 20px; margin-top: 20px; flex-grow: 1; }
        
        .info-card {
            background: var(--glass); border: 1px solid rgba(255,255,255,0.08);
            backdrop-filter: blur(20px); border-radius: 20px; padding: 20px;
            transition: 0.4s;
        }
        .info-card:hover { transform: translateY(-5px); border-color: var(--soft-teal); }

        .info-row { display: flex; align-items: center; margin-bottom: 10px; color: #ccc; font-size: 0.95rem; }
        
        /* ইনলাইন SVG আইকন (থার্ড-পার্টি লিঙ্ক বাদ দেওয়া হয়েছে) */
        .svg-icon { width: 20px; height: 20px; fill: var(--rose-gold); margin-right: 15px; }

        footer { text-align: center; padding: 30px; font-size: 0.8rem; color: #444; margin-top: auto; }

    </style>
</head>
<body>

    <div id="intro-overlay">
        <div class="loader-content">
            <div class="loader-ring"></div>
            <h2 style="margin-top: 20px; font-family: 'Hind Siliguri'; letter-spacing: 5px; color: #fff;">ব্যারিস্টার রাইসা</h2>
        </div>
    </div>

    <div id="main-ui">
        <header>
            <div class="profile-container" onclick="saveProfilePic()">
                <img src="https://via.placeholder.com/150" alt="Barrister Raisa"> <div class="save-overlay">
                    <svg class="svg-icon" viewBox="0 0 24 24" style="fill: var(--soft-teal); width: 15px; height: 15px;">
                        <path d="M19 12v7H5v-7H3v7a2 2 0 002 2h14a2 2 0 002-2v-7h-2zm-6 .67l2.59-2.58L17 11.5l-5 5-5-5 1.41-1.41L11 12.67V3h2v9.67z"></path>
                    </svg>
                </div>
            </div>
            <h1 class="title">ব্যারিস্টার রাইসা</h1>
            <p style="color: var(--soft-teal); letter-spacing: 4px; text-transform: uppercase; font-size: 0.8rem;">অফিশিয়াল পোর্টাল</p>
        </header>

        <section class="details-grid">
            <div class="info-card">
                <div class="info-row">
                    <svg class="svg-icon" viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5a2.5 2.5 0 110-5 2.5 2.5 0 010 5z"></path></svg>
                    Location: Greater Manchester
                </div>
                <div class="info-row">
                    <svg class="svg-icon" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"></path></svg>
                    Bangladesh
                </div>
            </div>

            <div class="info-card" style="border-bottom: 3px solid var(--rose-gold);">
                <div class="info-row">
                    <svg class="svg-icon" viewBox="0 0 24 24"><path d="M21 7.28V5c0-1.1-.9-2-2-2H5c-1.11 0-2 .9-2 2v2.28c-1.11 0-2 .9-2 2V19c0 1.1.89 2 2 2h16c1.1 0 2-.9 2-2v-9.72c0-1.1-.9-2-2-2zm-7 1.22l2.59-2.58L17 7.11 12 12 7 7.11l1.41-1.41L11 8.5V2h2v6.5zm-5 8.5H5v-2h4v2zm0-4H5V8h4v2.5z"></path></svg>
                    Birthday: March 19, 2005
                </div>
                <div class="info-row">
                    <svg class="svg-icon" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"></path></svg>
                    Single
                </div>
            </div>
        </section>

        <footer>
            <p>© 2026 ব্যারিস্টার রাইসা। সকল তথ্য সংরক্ষিত।</p>
        </footer>
    </div>

    <script>
        // 1. Intro Screen Control (1 SEC)
        window.addEventListener('load', () => {
            setTimeout(() => {
                const intro = document.getElementById('intro-overlay');
                const ui = document.getElementById('main-ui');
                intro.style.transform = 'translateY(-100%)'; // নতুন 'স্লাইড-আপ' এনিমেশন
                ui.style.display = 'flex';
                setTimeout(() => { ui.style.opacity = '1'; document.body.style.overflow = 'auto'; }, 100);
            }, 1000); // ঠিক ১ সেকেন্ড পর লোড হবে
        });

        // 2. Profile Photo Save Logic
        function saveProfilePic() {
            const imgSrc = document.querySelector('.profile-container img').src;
            if(confirm('আপনি কি এই প্রোফাইল ছবিটি আপনার ডিভাইসে সেভ করতে চান?')) {
                const link = document.createElement('a');
                link.href = imgSrc;
                link.download = 'Barrister_Raisa_Profile.png';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            }
        }
    </script>
</body>
</html>
