<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABSTRACT | UNIVERSAL NODE</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Playfair+Display:ital,wght@1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="/socket.io/socket.io.js"></script>
    
    <style>
        :root {
            --bg: #080808;
            --card: #111111;
            --accent: #e0c097;
            --text: #ffffff;
            --dim: #888888;
            --border: rgba(224, 192, 151, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); overflow: hidden; }

        /* ইন্ট্রো গেট ফিক্স */
        #gate {
            position: fixed; inset: 0; background: #000; z-index: 9999;
            display: flex; justify-content: center; align-items: center;
            transition: 1s ease-in-out;
        }
        .gate-label { font-family: 'Playfair Display'; font-size: 2rem; letter-spacing: 15px; color: var(--accent); animation: pulse 2s infinite; }

        .wrapper { display: flex; height: 100vh; width: 100vw; opacity: 0; transition: 1.5s; pointer-events: none; }
        .active .wrapper { opacity: 1; pointer-events: all; }

        nav { width: 70px; background: #000; border-right: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; padding: 25px 0; }
        nav i { font-size: 1.2rem; color: var(--dim); margin-bottom: 35px; cursor: pointer; transition: 0.3s; }
        nav i:hover, nav i.active { color: var(--accent); }

        .panel { width: 320px; background: #0a0a0a; border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .panel-header { padding: 25px; border-bottom: 1px solid var(--border); }
        .panel-header h2 { font-family: 'Playfair Display'; font-size: 1.2rem; color: var(--accent); letter-spacing: 2px; }

        .list { flex: 1; overflow-y: auto; padding: 10px; }
        .user { display: flex; align-items: center; padding: 12px; margin-bottom: 8px; cursor: pointer; border-radius: 8px; transition: 0.2s; }
        .user:hover { background: var(--card); }
        .user img { width: 45px; height: 45px; border-radius: 50%; border: 1px solid var(--accent); margin-right: 12px; }

        main { flex: 1; display: flex; flex-direction: column; background: #080808; position: relative; }
        .chat-view { flex: 1; padding: 30px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; }
        .bubble { max-width: 70%; padding: 12px 18px; font-size: 0.9rem; border-radius: 18px; position: relative; word-wrap: break-word; }
        .bubble.me { align-self: flex-end; background: var(--accent); color: #000; border-bottom-right-radius: 2px; }
        .bubble.them { align-self: flex-start; background: var(--card); border: 1px solid var(--border); border-bottom-left-radius: 2px; }

        .input-box { padding: 20px 30px; border-top: 1px solid var(--border); display: flex; align-items: center; gap: 15px; }
        .input-box input { flex: 1; background: transparent; border: none; color: #fff; outline: none; }

        #profile-setup {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 10000;
            display: none; justify-content: center; align-items: center; padding: 20px;
        }
        .setup-card { width: 100%; max-width: 400px; background: #111; padding: 30px; border: 1px solid var(--accent); border-radius: 4px; }
        
        @keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }
    </style>
</head>
<body>

    <div id="gate"><div class="gate-label">ABSTRACT</div></div>

    <div id="profile-setup">
        <div class="setup-card">
            <h3 style="color:var(--accent); margin-bottom:20px;">IDENTITY_INIT</h3>
            <input type="text" id="fname" placeholder="First Name" style="width:100%; padding:12px; margin-bottom:10px; background:#000; color:#fff; border:1px solid var(--border);">
            <input type="text" id="lname" placeholder="Last Name" style="width:100%; padding:12px; margin-bottom:10px; background:#000; color:#fff; border:1px solid var(--border);">
            <input type="text" id="location" placeholder="Your City" style="width:100%; padding:12px; margin-bottom:20px; background:#000; color:#fff; border:1px solid var(--border);">
            <button onclick="startSystem()" style="width: 100%; background: var(--accent); border: none; padding: 15px; cursor: pointer; font-weight:bold;">ACTIVATE NODE</button>
        </div>
    </div>

    <div class="wrapper">
        <nav>
            <i class="fas fa-terminal active"></i>
            <i class="fas fa-globe-americas"></i>
            <i class="fas fa-power-off" style="margin-top: auto;" onclick="wipeData()"></i>
        </nav>
        <aside class="panel">
            <div class="panel-header"><h2>NET_CORE</h2></div>
            <div class="list" id="users-container"></div>
        </aside>
        <main>
            <div class="chat-view" id="chat-flow"></div>
            <div class="input-box">
                <input type="text" id="main-input" placeholder="Enter encrypted message...">
                <i class="fas fa-paper-plane" style="color: var(--accent); cursor:pointer;" onclick="pushMsg()"></i>
            </div>
        </main>
    </div>

    <script>
        const socket = io();
        let db;

        window.onload = () => {
            const gate = document.getElementById('gate');
            setTimeout(() => {
                gate.style.opacity = '0';
                setTimeout(() => {
                    gate.style.display = 'none'; // গেট সরিয়ে দেওয়া হলো
                    document.body.classList.add('active');
                    
                    const savedUser = localStorage.getItem('node_id');
                    if(!savedUser) {
                        document.getElementById('profile-setup').style.display = 'flex';
                    } else {
                        socket.emit('register_node', JSON.parse(savedUser));
                    }
                }, 1000);
            }, 1000);
            initDB();
        };

        function initDB() {
            const req = indexedDB.open("AbstractVault", 1);
            req.onupgradeneeded = e => e.target.result.createObjectStore("messages", { keyPath: "id", autoIncrement: true });
            req.onsuccess = e => { db = e.target.result; loadStoredMessages(); };
        }

        function startSystem() {
            const fName = document.getElementById('fname').value;
            if(!fName) return alert("Identity Required.");
            const nodeData = {
                name: fName + ' ' + document.getElementById('lname').value,
                loc: document.getElementById('location').value,
                avatar: 'https://via.placeholder.com/45'
            };
            localStorage.setItem('node_id', JSON.stringify(nodeData));
            document.getElementById('profile-setup').style.display = 'none';
            socket.emit('register_node', nodeData);
        }

        function pushMsg() {
            const inp = document.getElementById('main-input');
            const userData = JSON.parse(localStorage.getItem('node_id'));
            if(!inp.value || !userData) return;
            socket.emit('send_message', { type: 'text', sender: userData.name, text: inp.value, time: new Date().toLocaleTimeString() });
            inp.value = '';
        }

        socket.on('receive_message', (data) => {
            if(db) {
                const tx = db.transaction("messages", "readwrite");
                tx.objectStore("messages").add(data);
            }
            renderMessage(data);
        });

        socket.on('update_user_list', (users) => {
            const container = document.getElementById('users-container');
            container.innerHTML = users.map(u => `
                <div class="user">
                    <img src="${u.avatar}">
                    <div class="user-meta"><h4>${u.name}</h4><p>${u.loc} • <span style="color:#00ff00">Online</span></p></div>
                </div>`).join('');
        });

        function renderMessage(data) {
            const chatFlow = document.getElementById('chat-flow');
            const b = document.createElement('div');
            const myName = JSON.parse(localStorage.getItem('node_id'))?.name;
            b.className = (data.sender === myName) ? 'bubble me' : 'bubble them';
            b.innerHTML = `<strong>${data.sender}</strong><br>${data.text}`;
            chatFlow.appendChild(b);
            chatFlow.scrollTop = chatFlow.scrollHeight;
        }

        function loadStoredMessages() {
            const tx = db.transaction("messages", "readonly");
            tx.objectStore("messages").getAll().onsuccess = e => e.target.result.forEach(m => renderMessage(m));
        }

        function wipeData() {
            if(confirm("Terminate Session?")) { localStorage.clear(); location.reload(); }
        }

        document.getElementById('main-input').addEventListener('keypress', e => { if (e.key === 'Enter') pushMsg(); });
    </script>
</body>
</html>
